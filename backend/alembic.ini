# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the "create_date" timestamp
# string template called with datetime.datetime.now(). Leave blank
# for most systems or None. Required for databases without native NOW() or CURRENT_TIMESTAMP
# sqlalchemy_now_func=now()

# max length of characters to apply to the
# "slug" field in the naming template
# truncate_slug_len = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to skip the source code line that
# calls op.create_table() or similar in the
# autogenerate block if the generated code
# has a length greater than the configured
# line_length. This only takes effect when
# the directive is enabled
# sqlalchemy_statement_helpers = false

# logging configuration
# Loggers to configure: sqlalchemy.engine, alembic.runtime.sqlmigration
[loggers]
keys = root,sqlalchemy.engine,alembic.runtime.sqlmigration

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic.runtime.sqlmigration]
level = INFO
handlers =
qualname = alembic.runtime.sqlmigration

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
