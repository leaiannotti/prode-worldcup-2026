name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          version=$(cat VERSION)
          if [ "v${version}" != "${{ github.ref_name }}" ]; then
            echo "::error::VERSION mismatch: ${version} vs ${{ github.ref_name }}"
            exit 1
          fi

  backend-tests:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: pytest backend/

  frontend-tests:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  changelog:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - run: git-cliff --config cliff.toml --tag ${{ github.ref_name }} --unreleased > RELEASE_NOTES.md
      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  release:
    needs: changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          token: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Notify Coolify (backend)
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_BACKEND_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::COOLIFY_BACKEND_WEBHOOK_URL not set; skipping backend deploy notification"
            exit 0
          fi
          echo "::add-mask::$WEBHOOK_URL"
          echo "::add-mask::$WEBHOOK_TOKEN"
          response_code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $WEBHOOK_TOKEN" \
            "$WEBHOOK_URL")
          echo "Coolify backend response: $response_code"
          if [ "$response_code" -lt 200 ] || [ "$response_code" -ge 300 ]; then
            exit 1
          fi
      - name: Notify Coolify (frontend)
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_FRONTEND_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::COOLIFY_FRONTEND_WEBHOOK_URL not set; skipping frontend deploy notification"
            exit 0
          fi
          echo "::add-mask::$WEBHOOK_URL"
          echo "::add-mask::$WEBHOOK_TOKEN"
          response_code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $WEBHOOK_TOKEN" \
            "$WEBHOOK_URL")
          echo "Coolify frontend response: $response_code"
          if [ "$response_code" -lt 200 ] || [ "$response_code" -ge 300 ]; then
            exit 1
          fi

  smoke-test:
    needs: notify
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy
        run: sleep 90
      - name: Probe /health (expect 200)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" https://api.prodescaloneta.online/health)
          echo "Health probe: $code"
          test "$code" = "200"
      - name: Probe /api/auth/me (expect 401 without token)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" https://api.prodescaloneta.online/api/auth/me)
          echo "Auth probe: $code"
          test "$code" = "401"

  notify-failure:
    needs: smoke-test
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Open incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🚨 Smoke test failed for ${{ github.ref_name }}" \
            --body "The release workflow completed but post-deploy smoke tests failed.\n\nWorkflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nInspect the deploy in Coolify and consider rolling back to the previous stable tag." \
            --label "release,incident"
