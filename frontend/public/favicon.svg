<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ball base -->
  <circle cx="32" cy="32" r="30" fill="#74ACDF" stroke="#003580" stroke-width="2"/>
  <!-- White stripes (Argentina jersey feel) -->
  <clipPath id="clip">
    <circle cx="32" cy="32" r="30"/>
  </clipPath>
  <g clip-path="url(#clip)">
    <rect x="0" y="0" width="64" height="64" fill="#74ACDF"/>
    <rect x="0" y="20" width="64" height="24" fill="white"/>
    <!-- Football pentagon pattern -->
    <polygon points="32,10 38,18 35,27 29,27 26,18" fill="#003580" opacity="0.85"/>
    <polygon points="18,22 26,22 29,30 23,35 16,32" fill="#003580" opacity="0.85"/>
    <polygon points="46,22 38,22 35,30 41,35 48,32" fill="#003580" opacity="0.85"/>
    <polygon points="32,42 26,34 29,26 35,26 38,34" fill="#003580" opacity="0.65"/>
  </g>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#003580" stroke-width="2"/>
</svg>
