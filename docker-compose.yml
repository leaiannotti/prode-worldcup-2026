services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prode
      POSTGRES_PASSWORD: ${DB_PASSWORD:-prode}
      POSTGRES_DB: prode_worldcup
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prode"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://prode:${DB_PASSWORD:-prode}@db:5432/prode_worldcup
      FLASK_ENV: ${FLASK_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET:-jwt-secret-key}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      INGESTION_SECRET: ${INGESTION_SECRET:-webhook-secret}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: flask run --host=0.0.0.0

volumes:
  db_data:
