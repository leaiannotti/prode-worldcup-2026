# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n\n
All notable changes to this project will be documented in this file.\n\n
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),\n
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
body = """
{% if version %}\n
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}\n
{% else %}\n
## [Unreleased]\n
{% endif %}\n
{% for group, commits in commits | group_by(attribute="group") %}\n
    ### {{ group | striptags | trim | upper_first }}\n
    {% for commit in commits %}\n
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\n
          {% if commit.breaking %}[**breaking**] {% endif %}\n
          {{ commit.message | upper_first }}\n
    {% endfor %}\n
{% endfor %}\n
"""
footer = """
{% for contributor in github.contributors %}\n
    {% if contributor.username %}\n
        - [@{{ contributor.username }}](https://github.com/{{ contributor.username }})\n
    {% endif %}\n
{% endfor %}\n
"""
trim = true
postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/leaiannotti/prode-worldcup-2026" },
]

[git]
conventional_commits = true
filter_unconventional = true
sort_commits = "newest"
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"

# Group commits by conventional type
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^perf", group = "Performance" },
  { message = "^ci", group = "CI/Build" },
  { message = "^build", group = "CI/Build" },
  { message = "^chore", group = "Maintenance" },
  { message = "^revert", group = "Reverts" },
  { message = "^style", group = "Style" },
  { message = "^test", group = "Testing" },
  { body = "^BREAKING CHANGE", group = "Breaking Changes" },
]

# Protect breaking changes from being filtered out by default
protect_breaking_commits = true
